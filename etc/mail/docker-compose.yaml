services:
  rspamd:
    image: rspamd/rspamd:latest
    container_name: rspamd
    user: "1000:1000"
    ports:
      - "11332:11332"  # Proxy worker
      - "11334:11334"  # Web interface
    volumes:
      - ./config/spam-config:/etc/rspamd/local.d
      - ./data/spam-data:/var/lib/rspamd
      - ./data/spam-logs:/var/log/rspamd
    depends_on:
      - redis
      - unbound
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: rspamd-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

  unbound:
    image: alpinelinux/unbound
    container_name: rspamd-unbound
    volumes:
      - ./config/unbound/unbound.conf:/etc/unbound/unbound.conf:ro
    restart: unless-stopped

volumes:
  redis-data:
