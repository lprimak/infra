sender_whitelist = {
  type = "header";
  header = "from";
  filter = "email:domain";
  symbol = "SENDER_WHITELIST";
  map = "/etc/rspamd/local.d/whitelist_senders.map";
  score = -50.0;
  description = "Whitelisted sender";
}

ip_blacklist = {
  type = "ip";
  filter = "smtp";
  symbol = "IP_BLACKLIST";
  map = "/etc/rspamd/local.d/blacklist_ips.map";
  score = 25.0;
  description = "Blacklisted IP address";
}
